name: Build & Deploy — GitHub Pages

on:
  push:
    branches:
      - main          # déclenché à chaque push sur main

permissions:
  contents: read
  pages: write        # nécessaire pour déployer sur GitHub Pages
  id-token: write     # nécessaire pour l'authentification OIDC

# Un seul déploiement à la fois ; les anciens jobs en attente sont annulés
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Svelte PWA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: maze-pwa

      - name: Build (base = /mazequestpwa/)
        run: npm run build
        working-directory: maze-pwa
        env:
          GITHUB_ACTIONS: true   # active le base URL /mazequestpwa/ dans vite.config.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: maze-pwa/dist    # dossier produit par Vite

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
