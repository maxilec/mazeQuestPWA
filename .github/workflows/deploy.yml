name: Build & Deploy — GitHub Pages

on:
  push:
    branches:
      - main                                 # build + deploy
      - 'claude/gyroscope-marble-maze-s2CPy' # build uniquement (validation CI)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # anticipe la migration Node.js 24

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Svelte PWA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: maze-pwa

      - name: Build (base = /mazeQuestPWA/)
        run: npm run build
        working-directory: maze-pwa
        env:
          GITHUB_ACTIONS: true

      # L'artifact n'est uploadé que pour main → seul main peut déployer
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: maze-pwa/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    # Condition explicite : deploy uniquement depuis main
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
