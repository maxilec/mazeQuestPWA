name: Build & Deploy — GitHub Pages

on:
  push:
    branches:
      - main
      - 'claude/gyroscope-marble-maze-s2CPy'
      - 'claude/refactor-game-ui-wFfsk'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# peaceiris/actions-gh-pages a besoin d'écrire sur la branche gh-pages
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy Svelte PWA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: maze-pwa

      - name: Build (base = /mazeQuestPWA/)
        run: npm run build
        working-directory: maze-pwa
        env:
          GITHUB_ACTIONS: true

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: maze-pwa/dist
