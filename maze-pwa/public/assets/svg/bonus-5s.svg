<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 200 200"
     role="img"
     aria-label="Bonus +5 secondes">
  <title>Bonus +5s</title>
  <defs>
    <!-- Neon glow filter — double Gaussian blur for halo + tight bloom -->
    <filter id="glow-5s" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"   result="halo"/>
      <feGaussianBlur stdDeviation="1.8" result="bloom"/>
      <feMerge>
        <feMergeNode in="halo"/>
        <feMergeNode in="halo"/>
        <feMergeNode in="bloom"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond translucide légèrement teinté pour donner du corps au disque -->
  <circle cx="100" cy="100" r="72" fill="#1ad8ff" fill-opacity="0.14"/>

  <!-- Anneau néon principal -->
  <g filter="url(#glow-5s)">
    <circle cx="100" cy="100" r="72" fill="none" stroke="#1ad8ff" stroke-width="6"/>
  </g>

  <!-- Texte centré -->
  <text x="100" y="100"
        text-anchor="middle" dominant-baseline="central"
        font-family="Orbitron, 'Courier New', monospace"
        font-weight="700" font-size="36"
        fill="#ffffff" letter-spacing="1">+5s</text>
</svg>
