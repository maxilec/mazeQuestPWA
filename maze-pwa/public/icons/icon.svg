<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" fill="#130902"/>
  <!-- Anneau doré -->
  <circle cx="96" cy="96" r="88" fill="none" stroke="#c49a6c" stroke-width="13"/>
  <!-- Surface de jeu -->
  <circle cx="96" cy="96" r="75" fill="#221005"/>
  <!-- Murs du labyrinthe (motif simplifié) -->
  <g stroke="#9B6840" stroke-width="5" stroke-linecap="square" fill="none">
    <line x1="36" y1="36" x2="96" y2="36"/>
    <line x1="96" y1="36" x2="156" y2="36"/>
    <line x1="36" y1="36" x2="36"  y2="96"/>
    <line x1="36" y1="96" x2="36"  y2="156"/>
    <line x1="36" y1="156" x2="156" y2="156"/>
    <line x1="156" y1="36" x2="156" y2="156"/>
    <line x1="36" y1="66" x2="76"  y2="66"/>
    <line x1="76" y1="36" x2="76"  y2="96"/>
    <line x1="76" y1="96" x2="116" y2="96"/>
    <line x1="116" y1="66" x2="156" y2="66"/>
    <line x1="116" y1="66" x2="116" y2="126"/>
    <line x1="36"  y1="126" x2="116" y2="126"/>
  </g>
  <!-- Bille métal -->
  <defs>
    <radialGradient id="bille" cx="35%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="40%"  stop-color="#cccccc"/>
      <stop offset="100%" stop-color="#555555"/>
    </radialGradient>
    <!-- Trou -->
    <radialGradient id="trou" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#000000"/>
      <stop offset="100%" stop-color="#220800"/>
    </radialGradient>
  </defs>
  <!-- Trou -->
  <circle cx="130" cy="126" r="10" fill="url(#trou)"/>
  <!-- Bille -->
  <circle cx="58" cy="58" r="13" fill="url(#bille)"/>
</svg>
